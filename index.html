    const container = document.getElementById('exercise-list');

    // สร้างโครงสร้างหน้าเว็บ
    questionsData.forEach(q => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        let testCasesHTML = '';
        q.test_cases.forEach((tc, index) => {
            testCasesHTML += `
                <div class="test-case">
<strong>Test Case ${index + 1}</strong>
Input:
${tc.input || '(ไม่มี Input)'}

Expected Output:
${tc.expected}
                </div>
            `;
        });

        card.innerHTML = `
            <span class="topic-badge">${q.topic}</span>
            <h2>ข้อที่ ${q.id}: ${q.title}</h2>
            <p>${q.description}</p>
            ${testCasesHTML}
            
            <div class="editor-section">
                <textarea id="code-${q.id}" class="code-editor" rows="6" placeholder="# เขียนโค้ด Python ของคุณที่นี่..."></textarea>
                <button class="run-btn" onclick="runCode(${q.id})">▶️ Run & Test</button>
                <pre id="output-${q.id}" class="output-console">Output จะแสดงที่นี่...</pre>
            </div>
        `;
        container.appendChild(card);
    });

    // ฟังก์ชันอ่านไฟล์ที่จำเป็นสำหรับ Skulpt
    function builtinRead(x) {
        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
            throw "File not found: '" + x + "'";
        return Sk.builtinFiles["files"][x];
    }

    // ฟังก์ชันรันโค้ดและตรวจคำตอบ
    async function runCode(id) {
        const code = document.getElementById(`code-${id}`).value;
        const outputDiv = document.getElementById(`output-${id}`);
        const q = questionsData.find(q => q.id === id);
        
        if (!code.trim()) {
            outputDiv.innerHTML = "⚠️ โปรดเขียนโค้ดก่อนทำการรัน";
            return;
        }

        outputDiv.innerHTML = "⏳ Running...\n\n";
        let allPassed = true;

        for (let i = 0; i < q.test_cases.length; i++) {
            let tc = q.test_cases[i];
            let inputs = tc.input ? tc.input.split('\n') : [];
            let actualOutput = "";

            // ตั้งค่า Skulpt
            Sk.configure({
                output: function(text) { actualOutput += text; },
                read: builtinRead,
                // จัดการฟังก์ชัน input() ของ Python ให้ดึงข้อมูลจาก Test Case
                inputfun: function() {
                    return new Promise((resolve) => {
                        let val = inputs.length > 0 ? inputs.shift() : "";
                        resolve(val);
                    });
                }
            });

            try {
                // รันโค้ด Python แบบ Async
                await Sk.misceval.asyncToPromise(() => Sk.importMainWithBody("<stdin>", false, code, true));
                
                // ตรวจคำตอบ (ตัดช่องว่างด้านหน้า/หลังออกเพื่อลดข้อผิดพลาดจากการพิมพ์)
                let cleanActual = actualOutput.trim();
                let cleanExpected = tc.expected.trim();

                if (cleanActual === cleanExpected) {
                    outputDiv.innerHTML += `✅ Test Case ${i+1}: Passed\n`;
                } else {
                    outputDiv.innerHTML += `❌ Test Case ${i+1}: Failed\n   Expected: ${cleanExpected}\n   Got:      ${cleanActual}\n`;
                    allPassed = false;
                }
            } catch (err) {
                outputDiv.innerHTML += `⚠️ Test Case ${i+1}: Error\n   ${err.toString()}\n`;
                allPassed = false;
            }
        }
        
        if(allPassed) {
            outputDiv.innerHTML += `\n🎉 ยินดีด้วย! โค้ดของคุณผ่านทุก Test Case สำหรับข้อนี้`;
            outputDiv.style.borderLeftColor = "#28a745";
        } else {
            outputDiv.style.borderLeftColor = "#dc3545";
        }
    }
</script>
